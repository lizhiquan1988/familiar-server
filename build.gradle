plugins {
	id 'java'
	id 'org.springframework.boot' version '3.1.4'
	id 'io.spring.dependency-management' version '1.1.3'
}

group = 'com.example'
version = '0.0.1-SNAPSHOT'

java {
	sourceCompatibility = JavaVersion.VERSION_17
	targetCompatibility = JavaVersion.VERSION_17
}

configurations {
	compileOnly {
		extendsFrom annotationProcessor
	}
}

repositories {
	mavenCentral()
}

configurations {
	configureEach {
		exclude group: "io.netty", module: "netty-transport-native-epoll"
	}
}


dependencies {
	implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
	implementation 'org.springframework.boot:spring-boot-starter-web'
	implementation 'org.springframework.boot:spring-boot-starter-webflux'
	implementation 'com.fasterxml.jackson.core:jackson-databind'
	compileOnly 'org.projectlombok:lombok'
	developmentOnly 'org.springframework.boot:spring-boot-devtools'
	runtimeOnly 'com.mysql:mysql-connector-j'
	annotationProcessor 'org.projectlombok:lombok'
	testImplementation 'org.springframework.boot:spring-boot-starter-test'
    // https://mvnrepository.com/artifact/org.springframework/spring-websocket
    implementation("org.springframework:spring-websocket:6.0.13")
    // https://mvnrepository.com/artifact/com.google.code.gson/gson
    implementation("com.google.code.gson:gson:2.10.1")
    // https://mvnrepository.com/artifact/io.netty/netty-all
    implementation group: 'io.netty', name: 'netty-all', version: '4.1.108.Final'
    // https://mvnrepository.com/artifact/com.alibaba.fastjson2/fastjson2
    implementation group: 'com.alibaba.fastjson2', name: 'fastjson2', version: '2.0.40'
	implementation 'io.jsonwebtoken:jjwt-api:0.12.6' // JWT API
	runtimeOnly 'io.jsonwebtoken:jjwt-impl:0.12.6'   // JWT 实现
	runtimeOnly 'io.jsonwebtoken:jjwt-jackson:0.12.6' // 如果需要 JSON 支持
	// Guava RateLimiter用与实现访问限流
	implementation 'com.google.guava:guava:32.0.1-android'
	implementation 'org.springframework.boot:spring-boot-starter-mail'
	implementation 'com.linecorp.bot:line-bot-spring-boot:5.0.0'
	runtimeOnly 'com.squareup.retrofit2:retrofit:2.9.0'
	runtimeOnly 'com.squareup.retrofit2:converter-jackson:2.9.0'

}

tasks.named('test') {
	useJUnitPlatform()
}

